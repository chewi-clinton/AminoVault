<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}AminoVault{% endblock %}</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f2f6; font-family:'Segoe UI', Helvetica, Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f2f6; padding:32px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px; width:100%; background-color:#ffffff; border-radius:12px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.06);">

          <!-- Header -->
          <tr>
            <td style="background-color:#ffffff; padding:28px 32px 22px; text-align:center;">
              <img src="{{ logo_url }}" alt="AminoVault" width="170" style="display:block; margin:0 auto; border:0; outline:none;">
            </td>
          </tr>
          <tr>
            <td style="padding:0; line-height:0; font-size:0;">
              <div style="height:5px; background-color:#ca33d2; background-image:linear-gradient(90deg,#8801ff 0%,#e91831 100%);">&nbsp;</div>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:36px 32px;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#faf8fb; padding:24px 32px; text-align:center; border-top:1px solid #eee;">
              <p style="margin:0 0 6px 0; font-family:'Segoe UI', Helvetica, Arial, sans-serif; font-size:13px; font-weight:700; color:#333;">AminoVault</p>
              <p style="margin:0 0 12px 0; font-family:'Segoe UI', Helvetica, Arial, sans-serif; font-size:11px; color:#999;">Locked in purity. Delivered with precision.</p>
              <p style="margin:0; font-family:'Segoe UI', Helvetica, Arial, sans-serif; font-size:11px; line-height:1.6; color:#aaa;">
                For laboratory research use only. Not for human or veterinary use.<br>
                &copy; {% now "Y" %} AminoVault, LLC. All rights reserved.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
